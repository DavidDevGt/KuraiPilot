name: Bug
description: Algo no funciona como la spec dice que debería
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: Qué pasa
      description: Comportamiento observado vs. esperado. Si contradice docs/02, citá la sección.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproducción
      description: Comando exacto + características del video de entrada (códec, resolución, fps — `ffprobe` ayuda). Si un input rompe el pipeline, ese input se convierte en fixture (docs/06 §6).
      placeholder: |
        kurai convert video.mp4 --preset retro
        # input: h264 1080p30 VFR, rotación 90°, sin audio
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Salida de `kurai doctor`
      render: text
    validations:
      required: true
