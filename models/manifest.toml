# Modelos ONNX del AI Sidecar (docs/04). Los binarios NO van al repo:
# tools/fetch_models.py los descarga y verifica por SHA-256 pineado.
#
# Los campos url/sha256 se pinean al integrar cada modelo (Fase 1 para
# saliency, Fase 2 para glyph_cnn). Un modelo sin URL simplemente no se
# descarga y el pipeline degrada al modo determinista.

[models.saliency]
# U2Net-lite (ADR-004). Variante "u2netp" (~4.6 MB), release de rembg (Apache-2.0).
# Salida directa: mapa de saliencia [0,1], entrada 320×320. Pineado en Fase 1.
filename = "u2net_lite.onnx"
url = "https://github.com/danielgatis/rembg/releases/download/v0.0.0/u2netp.onnx"
sha256 = "309c8469258dda742793dce0ebea8e6dd393174f89934733ecc8b14c76f4ddd8"

[models.glyph_cnn]
# CNN propia entrenada en training/ y exportada a ONNX. Pinear en Fase 2.
filename = "glyph_cnn.onnx"
url = ""
sha256 = ""
